<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Scatter Grid Viewer</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
        }

        #topBar {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        #grid {
            display: grid;
            padding: 10px;
        }

        #plots {
            padding: 10px;
        }

        button {
            margin-right: 10px;
            padding: 6px 12px;
        }
    </style>
</head>

<body>

<div id="topBar">
    <button id="normalBtn">Normal</button>
    <button id="colorBtn">Color</button>
</div>

<div id="colorControls"></div>

<h3 id="plotsTitle" style="display:none;">Plots</h3>

<div id="grid"></div>
<div id="plots"></div>

<script src="app.js"></script>

</body>
</html>
