<!DOCTYPE html>
<html>
<head>
    <title>Scatter Grid Viewer</title>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            margin-top: 20px;
        }

        /* =========================
           GRID CONTAINER
           ========================= */
        #grid {
            display: grid;
            gap: 6px;
            align-items: center;
            margin-top: 10px;
        }

        #grid div {
            text-align: center;
            font-family: Arial;
        }

        /* =========================
           CELL STYLE (USED BY JS)
           ========================= */
        .cell {
            padding: 10px;
            border: 1px solid black;
            cursor: pointer;
            text-align: center;
            background: white;
            transition: 0.2s;
            min-height: 60px;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell:hover {
            background: #f2f2f2;
        }

        /* =========================
           PLOTS AREA
           ========================= */
        #plots {
            display: none; /* JS toggles this */
            margin-top: 20px;
        }

        /* Plot containers inside grid */
        #plots > div {
            width: 100%;
        }

        /* =========================
           CONTROL BUTTONS (if you have them)
           ========================= */
        button {
            padding: 6px 12px;
            margin: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #f0f0f0;
        }
        /* =========================
           GRID + INFO PANEL
           ========================= */
        #gridArea {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        
        /* right side panel */

                
        #distributionText {
            font-size: 20px;
            line-height: 1.6;
            margin-top:15px;
        }
        #gridContainer{
            display:block;
        }
        #distributionImg {
            width: 100%;
            display: block;
        }
        #infoPanel{
            width:500px;
            border:1px solid #ccc;
            padding:15px;
            background:white;
        } 
    </style>
</head>

<body>

<h2>Parameter Grid</h2>
    
<div id="gridContainer">
    <div id="grid"></div>
</div>

<div id="colorControls" style="display:none;">
    <button id="normalBtn">Normal</button>
    <button id="colorBtn">Color</button>
</div>

<h2 id="plotsTitle" style="display:none;">Plots</h2>
<div id="plots"></div>

<script src="app.js?v=2"></script>

</body>
</html>
